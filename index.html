<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sofia González Irigoyen</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0a0a0a; --bg2:#111; --bg3:#1a1a1a; --border:#2a2a2a;
    --text:#fff; --muted:#999; --terra:#E50914; --terra-dark:#B20710;
    --font:'Bebas Neue',sans-serif; --sans:'DM Sans','Helvetica Neue',Arial,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; overflow-x:hidden; }

  #tap-screen {
    position:fixed; inset:0; z-index:200;
    background:
      radial-gradient(circle at 50% 46%, rgba(229,9,20,.18), transparent 26%),
      linear-gradient(180deg,#050505 0%,#000 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    cursor:pointer; transition:opacity .5s;
  }
  #tap-screen.fade-out { opacity:0; pointer-events:none; }
  .tap-prompt { display:flex; flex-direction:column; align-items:center; gap:1.5rem; animation:pulse 2s ease-in-out infinite; }
  .tap-logo {
    font-family:var(--font);
    font-size:clamp(2.5rem,7vw,4.6rem);
    letter-spacing:.08em;
    color:#fff;
    text-shadow:0 0 24px rgba(229,9,20,.45);
  }
  .tap-ring {
    width:72px; height:72px; border-radius:50%;
    border:2px solid rgba(255,255,255,.78);
    background:var(--terra);
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:1.55rem;
    box-shadow:0 0 34px rgba(229,9,20,.45);
  }
  .tap-hint { font-size:.78rem; letter-spacing:.25em; text-transform:uppercase; color:rgba(255,255,255,.78); }
  @keyframes pulse { 0%,100%{opacity:.9;transform:scale(1);} 50%{opacity:1;transform:scale(1.04);} }

  #intro-screen {
    position:fixed; inset:0; z-index:100;
    background:#000;
    display:none; align-items:center; justify-content:center;
  }
  #intro-screen.active { display:flex; }

  /* landscape/desktop: letterbox so full video is visible */
  #intro-video {
    width:100%; height:100%;
    object-fit:contain;
    display:block;
  }
  /* portrait/mobile: fill the screen with the vertical video */
  @media (orientation: portrait) {
    #intro-video { object-fit:cover; }
  }

  #intro-fade { position:absolute; inset:0; background:#000; opacity:0; pointer-events:none; transition:opacity .8s ease; }

  #profile-screen {
    min-height:100vh;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:2rem;
    background:linear-gradient(160deg,#0a0a0a 0%,#1a0000 100%);
    opacity:0; transition:opacity .6s;
  }
  #profile-screen.active { display:flex; }
  #profile-screen.visible { opacity:1; }

  .ps-heading { font-family:var(--font); font-size:clamp(2rem,4vw,3rem); letter-spacing:.1em; color:var(--text); margin-bottom:.5rem; text-align:center; }
  .ps-sub { font-size:.82rem; color:var(--muted); margin-bottom:3.5rem; text-align:center; letter-spacing:.08em; }

  .profiles {
    display:grid;
    grid-template-columns: repeat(4, 120px);
    gap:2.5rem;
    justify-content:center;
    max-width:780px;
  }
  .profile-card { display:flex; flex-direction:column; align-items:center; gap:.9rem; cursor:pointer; transition:transform .2s; text-decoration:none; }
  .profile-card:hover { transform:scale(1.08); }
  .profile-card:hover .profile-avatar { outline:3px solid #fff; }
  .profile-card:hover .profile-name { color:#fff; }

  .profile-avatar { width:120px; height:120px; border-radius:6px; overflow:hidden; outline:3px solid transparent; transition:outline .2s; background:var(--bg2); }
  .profile-avatar img { width:100%; height:100%; object-fit:cover; display:block; }
  .profile-avatar .fallback { width:100%; height:100%; display:none; align-items:center; justify-content:center; font-size:3rem; }

  .profile-name {
    max-width:150px;
    font-family:var(--font);
    font-size:1rem;
    line-height:1.15;
    letter-spacing:.15em;
    color:var(--muted);
    text-align:center;
    text-transform:uppercase;
    transition:color .2s;
  }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .ps-sub { margin-bottom:2.5rem; }
    .profiles {
      grid-template-columns: repeat(2, 1fr);
      gap:1.6rem 2rem;
      max-width:320px;
    }
    .profile-avatar { width:100%; height:0; padding-bottom:100%; position:relative; }
    .profile-avatar img,
    .profile-avatar .fallback {
      position:absolute; inset:0; width:100%; height:100%;
    }
  }
  @media (max-width: 360px) {
    .profiles { max-width:260px; gap:1.2rem 1.4rem; }
  }
</style>
</head>
<body>

<div id="tap-screen" onclick="startIntro()">
  <div class="tap-prompt">
    <div class="tap-logo">Sofia's Portfolio</div>
    <div class="tap-ring">▶</div>
    <div class="tap-hint">Tap anywhere to start</div>
  </div>
</div>

<div id="intro-screen">
  <video id="intro-video" muted playsinline></video>
  <div id="intro-fade"></div>
</div>

<div id="profile-screen">
  <h2 class="ps-heading">WHO'S WATCHING?</h2>
  <p class="ps-sub">Choose the version of Sofia's work you want to browse</p>
  <div class="profiles">

    <a href="recruiter.html" class="profile-card">
      <div class="profile-avatar">
        <img src="YOUR-IMAGE-1.png" alt="Production" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="fallback">🎬</div>
      </div>
      <span class="profile-name">Production</span>
    </a>

    <a href="agency.html" class="profile-card">
      <div class="profile-avatar">
        <img src="YOUR-IMAGE-3.png" alt="Advertising" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="fallback">📋</div>
      </div>
      <span class="profile-name">Advertising</span>
    </a>

    <a href="director.html" class="profile-card">
      <div class="profile-avatar">
        <img src="YOUR-IMAGE-2.png" alt="Collaborators" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="fallback">🎥</div>
      </div>
      <span class="profile-name">Collaborators</span>
    </a>

    <a href="stalker.html" class="profile-card">
      <div class="profile-avatar">
        <img src="YOUR-IMAGE-5.png" alt="Stalker" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
        <div class="fallback">👀</div>
      </div>
      <span class="profile-name">you found me</span>
    </a>

  </div>
</div>

<script>
  const INTRO_DURATION = 5200;

  function startIntro() {
    const tap = document.getElementById('tap-screen');
    tap.classList.add('fade-out');
    setTimeout(() => tap.style.display = 'none', 500);

    const intro = document.getElementById('intro-screen');
    const video = document.getElementById('intro-video');

    // Use vertical video on portrait screens (phones held upright)
    const isPortrait = window.innerHeight > window.innerWidth;
    video.src = isPortrait ? 'media/vertical-intro.mp4' : 'media/intro.mp4';

    intro.classList.add('active');

    video.play().then(() => {
      const audio = new Audio("media/tada.mp3");
      audio.volume = 0.8;
      audio.play().catch(() => {});
    }).catch(() => {});

    setTimeout(() => {
      document.getElementById('intro-fade').style.opacity = '1';
    }, INTRO_DURATION - 800);

    setTimeout(() => {
      intro.style.display = 'none';
      const ps = document.getElementById('profile-screen');
      ps.classList.add('active');
      setTimeout(() => ps.classList.add('visible'), 50);
    }, INTRO_DURATION + 100);
  }
</script>
</body>
</html>
