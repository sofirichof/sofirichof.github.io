<meta name="description" content="Portfolio of Sofia González Irigoyen, a bilingual student producer focused on broadcast, film, and live television."/>
<title>Sofia González Irigoyen | Producer Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #141414;
    --bg2: #181818;
    --bg3: #232323;
    --panel: #1f1f1f;
    --border: rgba(255,255,255,.12);
    --text: #fff;
    --soft: rgba(255,255,255,.78);
    --muted: rgba(255,255,255,.54);
    --red: #e50914;
    --red-dark: #b20710;
    --green: #46d369;
    --font: "Bebas Neue", Impact, sans-serif;
    --sans: "DM Sans", "Helvetica Neue", Arial, sans-serif;
    --ease: cubic-bezier(.2,.75,.25,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; background: var(--bg); }
  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    overflow-x: hidden;
  }
  body.modal-open { overflow: hidden; }
  img, video { max-width: 100%; }
  button, a { -webkit-tap-highlight-color: transparent; }
  button { font: inherit; }
  a { color: inherit; }
  :focus-visible {
    outline: 2px solid #fff;
    outline-offset: 3px;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    border: 0;
  }

  #loading {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #000;
    display: grid;
    place-items: center;
    transition: opacity .55s ease, visibility .55s ease;
    animation: loadingFailsafe .45s ease 1.2s forwards;
  }
  #loading.done {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .spinner-wrap {
    position: relative;
    width: 7rem;
    height: 7rem;
  }
  .spinner-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,.14);
    border-top-color: var(--red);
    animation: spin 1s linear infinite;
  }
  .spinner-avatar {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 4.5rem;
    height: 4.5rem;
    transform: translate(-50%, -50%);
    border-radius: 5px;
    object-fit: cover;
    background: #222;
    box-shadow: 0 16px 36px rgba(229,9,20,.25);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
